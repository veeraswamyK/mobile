name: Mobile Automation Pipeline

on:
  workflow_dispatch:
    inputs:
      executionType:
        description: "Execution type"
        required: true
        default: cloud
        type: choice
        options:
          - cloud
          - local-emulator
          - local-real
          - hybrid
      tags:
        description: "Cucumber tag filter (e.g. @smoke, @cart)"
        required: false
        default: "@smoke"

jobs:
  mobile-tests:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        env:
          BSUSER:   ${{ secrets.BS_USER }}
          BSKEY:    ${{ secrets.BS_KEY }}
          BSAPP_ID: ${{ secrets.BS_APP_ID }}
        run: |
          mvn clean test \
            "-Dcucumber.filter.tags=${{ github.event.inputs.tags }}" \
            -DexecutionType=${{ github.event.inputs.executionType }} \
            -DbsUser=${{ secrets.BS_USER }} \
            -DbsKey=${{ secrets.BS_KEY }} \
            -DbsAppId=${{ secrets.BS_APP_ID }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 14

      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: target/cucumber-reports
          retention-days: 14

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: test-output/screenshots
          retention-days: 7
