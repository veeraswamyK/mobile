name: Mobile Cloud Run

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run Cloud Tests
        run: |
          mvn clean test "-Dcucumber.filter.tags=@smoke" -DexecutionType=cloud -DbsUser=${{ secrets.BS_USER }} -DbsKey=${{ secrets.BS_KEY }} -DbsAppId=${{ secrets.BS_APP_ID }}
