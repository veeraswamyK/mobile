# `.github/workflows/mobile-ci.yml`

```yaml
name: Mobile Automation CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
    # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      executionType:
        description: "Execution type (cloud, local-android, local-ios, hybrid)"
        required: true
        default: local-android
        type: choice
        options:
          - cloud
          - local-android
          - local-ios
          - hybrid
      tags:
        description: "Cucumber tag filter"
        required: false
        default: "@smoke or @login or @cart or @prod or @nav"
      uploadArtifacts:
        description: "Upload detailed artifacts (screenshots, logs)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      execution-type: ${{ steps.determine-type.outputs.type }}
      tags: ${{ steps.determine-tags.outputs.tags }}

    steps:
      - name: Determine execution type
        id: determine-type
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.executionType }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "type=local-android" >> "$GITHUB_OUTPUT"
          else
            echo "type=cloud" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine tags
        id: determine-tags
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tags=${{ github.event.inputs.tags }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "tags=@regression" >> "$GITHUB_OUTPUT"
          else
            echo "tags=@smoke or @login or @cart or @prod or @nav" >> "$GITHUB_OUTPUT"
          fi

  mobile-tests:
    needs: prepare
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60

    steps:
      # ============================================
      # 1. CHECKOUT & TOOLCHAIN SETUP
      # ============================================
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ============================================
      # 2. APPIUM INSTALLATION
      # ============================================
      - name: Install Appium CLI
        if: needs.prepare.outputs.execution-type != 'cloud'
        shell: bash
        run: |
          sudo npm install -g appium@latest --ignore-scripts
          appium --version

      - name: Install Android driver
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        shell: bash
        run: |
          appium driver install uiautomator2
          appium driver list

      - name: Install iOS driver
        if: needs.prepare.outputs.execution-type == 'local-ios' || needs.prepare.outputs.execution-type == 'hybrid'
        shell: bash
        run: |
          appium driver install xcuitest
          appium driver list

      # ============================================
      # 3. ANDROID EMULATOR SETUP
      # ============================================
      - name: Set up Android SDK
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        uses: android-actions/setup-android@v4

      - name: Create Android Emulator
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpulse0 \
            libxext6 \
            libxrender1 \
            libxkbcommon0 \
            libfontconfig1 \
            jq

          echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "system-images;android-33;google_apis;x86_64"

          echo "no" | "$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager" create avd \
            -n emulator-5554 \
            -k "system-images;android-33;google_apis;x86_64" \
            -c 2048M \
            -f

      - name: Start Android Emulator
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        shell: bash
        run: |
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd emulator-5554 \
            -no-snapshot-load \
            -no-snapshot-save \
            -no-audio \
            -no-boot-anim \
            -gpu off &

          echo "Waiting for emulator to boot..."
          "$ANDROID_HOME/platform-tools/adb" wait-for-device

          for i in {1..60}; do
            if "$ANDROID_HOME/platform-tools/adb" shell getprop sys.boot_completed | tr -d '\r' | grep -q '^1$'; then
              echo "Emulator is ready!"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done

          "$ANDROID_HOME/platform-tools/adb" devices

      # ============================================
      # 4. START APPIUM SERVER
      # ============================================
      - name: Start Appium Server
        if: needs.prepare.outputs.execution-type != 'cloud'
        shell: bash
        run: |
          mkdir -p appium-logs

          nohup appium \
            --log-level debug \
            --log-timestamp \
            --log-file appium-logs/server.log &

          echo $! > appium.pid
          echo "Appium PID: $(cat appium.pid)"

          for i in {1..30}; do
            if curl -sf http://127.0.0.1:4723/status > /dev/null; then
              echo "Appium server is ready!"
              break
            fi
            echo "Waiting for Appium ($i/30)..."
            sleep 1
          done

      - name: Verify Appium Server
        if: needs.prepare.outputs.execution-type != 'cloud'
        shell: bash
        run: |
          curl -s http://127.0.0.1:4723/status | jq . || true

      # ============================================
      # 5. BUILD & TEST EXECUTION
      # ============================================
      - name: Build with Maven
        shell: bash
        run: |
          mvn clean compile -DskipTests -Dmaven.artifact.threads=10

      - name: Run Mobile Automation Tests
        id: run-tests
        continue-on-error: true
        env:
          BS_USER: ${{ secrets.BS_USER }}
          BS_KEY: ${{ secrets.BS_KEY }}
          BS_APP_ID: ${{ secrets.BS_APP_ID }}
          EXECUTION_TYPE: ${{ needs.prepare.outputs.execution-type }}
          UPLOAD_SCREENSHOTS: ${{ github.event.inputs.uploadArtifacts || 'true' }}
          RETRY_ATTEMPTS: '2'
        shell: bash
        run: |
          mvn test \
            -Dtest=runners.TestRunner \
            "-Dcucumber.filter.tags=${{ needs.prepare.outputs.tags }}" \
            -DexecutionType=${{ needs.prepare.outputs.execution-type }} \
            -DbsUser=${{ secrets.BS_USER }} \
            -DbsKey=${{ secrets.BS_KEY }} \
            -DbsAppId=${{ secrets.BS_APP_ID }} \
            -Dappium.host=127.0.0.1 \
            -Dappium.port=4723 \
            -e

      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        shell: bash
        run: |
          echo "::warning::Tests failed. Review logs and artifacts for details."
          exit 1

      # ============================================
      # 6. COLLECT ARTIFACTS
      # ============================================
      - name: Collect Allure Results
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/allure-results
          if [ -d target/allure-results ]; then
            cp -r target/allure-results/. artifacts/allure-results/ || true
          fi
          ls -la artifacts/allure-results || true

      - name: Collect Reports
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/reports

          if [ -d test-output ]; then
            cp -r test-output/. artifacts/reports/ || true
          fi

          if [ -d target/cucumber-reports ]; then
            cp -r target/cucumber-reports/. artifacts/reports/ || true
          fi

          if [ -d reports ]; then
            cp -r reports/. artifacts/reports/ || true
          fi

      - name: Collect Screenshots and Logs
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/screenshots artifacts/logs

          if [ -d test-output/screenshots ]; then
            cp -r test-output/screenshots/. artifacts/screenshots/ || true
          fi

          if [ -d screenshots ]; then
            cp -r screenshots/. artifacts/screenshots/ || true
          fi

          if [ -d appium-logs ]; then
            cp -r appium-logs/. artifacts/logs/ || true
          fi

      # ============================================
      # 7. UPLOAD ARTIFACTS
      # ============================================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/logs/
          retention-days: 7
          if-no-files-found: warn

      # ============================================
      # 8. CLEANUP
      # ============================================
      - name: Stop Appium Server
        if: always() && needs.prepare.outputs.execution-type != 'cloud'
        continue-on-error: true
        shell: bash
        run: |
          if [ -f appium.pid ]; then
            kill "$(cat appium.pid)" || true
          fi
          pkill -f appium || true

      - name: Stop Android Emulator
        if: always() && (needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid')
        continue-on-error: true
        shell: bash
        run: |
          "$ANDROID_HOME/platform-tools/adb" emu kill || true
          pkill -f emulator || true

  # ============================================
  # ALLURE REPORT GENERATION & DEPLOYMENT
  # ============================================
  publish-allure-report:
    if: always()
    needs: mobile-tests
    runs-on: ubuntu-latest

    steps:
      - name: Download Allure Results
        uses: actions/download-artifact@v5
        with:
          pattern: allure-results-*
          path: allure-data
          merge-multiple: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-data
          allure_history: allure-history
          gh_pages: gh-pages

      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/master' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

  # ============================================
  # NOTIFICATIONS
  # ============================================
  notify:
    if: always()
    needs:
      - mobile-tests
      - publish-allure-report
    runs-on: ubuntu-latest

    steps:
      - name: Determine Status
        id: status
        shell: bash
        run: |
          if [ "${{ needs.mobile-tests.result }}" = "success" ]; then
            echo "status_name=✅ SUCCESS" >> "$GITHUB_OUTPUT"
            echo "color_name=good" >> "$GITHUB_OUTPUT"
          else
            echo "status_name=❌ FAILURE" >> "$GITHUB_OUTPUT"
            echo "color_name=danger" >> "$GITHUB_OUTPUT"
          fi

      - name: Slack Notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Mobile Test Pipeline: ${{ steps.status.outputs.status_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📱 Mobile Automation Test Results"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Execution Type:*\n${{ needs.prepare.outputs.execution-type }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* ${{ steps.status.outputs.status_name }}\n*Pipeline:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Final Summary
        shell: bash
        run: |
          echo "Pipeline completed with status: ${{ needs.mobile-tests.result }}"
```
