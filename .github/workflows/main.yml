name: Mobile Automation CI/CD Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  schedule:
     # 6:00 PM IST = 12:30 PM UTC
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      executionType:
        description: "Execution type (cloud, local-android, local-ios, hybrid)"
        required: true
        default: "local-android"
        type: choice
        options:
          - cloud
          - local-android
          - local-ios
          - hybrid
      tags:
        description: "Cucumber tag filter (e.g. @smoke, @critical, @regression)"
        required: false
        default: "@smoke and @login and @cart and @prod and @nav"
      uploadArtifacts:
        description: "Upload detailed artifacts (screenshots, logs)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  # Determine execution environment
  prepare:
    runs-on: ubuntu-latest
    outputs:
      execution-type: ${{ steps.determine-type.outputs.type }}
      tags: ${{ steps.determine-tags.outputs.tags }}
    steps:
      - name: Determine execution type
        id: determine-type
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "type=${{ github.event.inputs.executionType }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "type=local-android" >> $GITHUB_OUTPUT
          else
            echo "type=cloud" >> $GITHUB_OUTPUT
          fi
      - name: Determine tags
        id: determine-tags
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tags=${{ github.event.inputs.tags }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "tags=@regression" >> $GITHUB_OUTPUT
          else
            echo "tags=@smoke or @login or @cart or @prod or @nav" >> $GITHUB_OUTPUT
          fi

  # Main test job
  mobile-tests:
    needs: prepare
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60
    strategy:
      fail-fast: false

    steps:
      # ============================================
      # 1. CHECKOUT & SETUP
      # ============================================
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for better reporting

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven

      - name: Set up Node.js (for Appium)
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      # ============================================
      # 2. INSTALL DEPENDENCIES
      # ============================================
      - name: Install global Appium CLI
        if: needs.prepare.outputs.execution-type != 'cloud'
        run: |
          sudo npm install -g appium@next --ignore-scripts
          appium --version

      - name: Install Appium drivers (Android)
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        run: |
          appium driver install uiautomator2
          appium driver list installed

      - name: Install Appium drivers (iOS)
        if: needs.prepare.outputs.execution-type == 'local-ios' || needs.prepare.outputs.execution-type == 'hybrid'
        run: |
          appium driver install xcuitest
          appium driver list installed

      # ============================================
      # 3. ANDROID EMULATOR SETUP (LOCAL)
      # ============================================
      - name: Set up Android SDK
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        uses: android-actions/setup-android@v4

      - name: Create Android Emulator
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0 libxext6 libxrender1 libxkbcommon0 libfontconfig1
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-33;google_apis;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n emulator-5554 -k "system-images;android-33;google_apis;x86_64" -c 2048M -force

      - name: Start Android Emulator
        if: needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid'
        run: |
          nohup $ANDROID_HOME/emulator/emulator -avd emulator-5554 -no-snapshot-load -no-snapshot-save -no-audio -no-boot-anim -gpu off &
          echo "Waiting for emulator to boot..."
          $ANDROID_HOME/platform-tools/adb wait-for-device
          $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_from_charger_mode
          for i in {1..60}; do
            if $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed | grep -q 1; then
              echo "Emulator is ready!"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          $ANDROID_HOME/platform-tools/adb devices

      # ============================================
      # 4. START APPIUM SERVER
      # ============================================
      - name: Start Appium Server
        if: needs.prepare.outputs.execution-type != 'cloud'
        run: |
          mkdir -p appium-logs
          nohup appium --log-level debug --log-timestamp --log-file appium-logs/server.log &
          APPIUM_PID=$!
          echo "$APPIUM_PID" > appium.pid
          echo "Appium PID: $APPIUM_PID"
          echo "Waiting for Appium server to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:4723/status > /dev/null; then
              echo "Appium server is ready!"
              break
            fi
            echo "Waiting for Appium ($i/30)..."
            sleep 1
          done

      - name: Verify Appium Server
        if: needs.prepare.outputs.execution-type != 'cloud'
        run: |
          curl -s http://localhost:4723/status | jq . || echo "Appium server status check"

      # ============================================
      # 5. BUILD & TEST EXECUTION
      # ============================================
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          mvn clean compile -DskipTests \
            -X -e \
            -Dmaven.artifact.threads=10

      - name: Run Mobile Automation Tests
        id: run-tests
        continue-on-error: true
        env:
          # Cloud credentials (if using BrowserStack)
          BS_USER: ${{ secrets.BS_USER }}
          BS_KEY: ${{ secrets.BS_KEY }}
          BS_APP_ID: ${{ secrets.BS_APP_ID }}
          # Appium configuration
          APPIUM_HOST: "127.0.0.1"
          APPIUM_PORT: "4723"
          # Framework configuration
          EXECUTION_TYPE: ${{ needs.prepare.outputs.execution-type }}
          UPLOAD_SCREENSHOTS: ${{ github.event.inputs.uploadArtifacts }}
          RETRY_ATTEMPTS: "2"
        run: |
          mvn test \
            -Dtest=runners.TestRunner \
            "-Dcucumber.filter.tags=${{ needs.prepare.outputs.tags }}" \
            -DexecutionType=${{ needs.prepare.outputs.execution-type }} \
            -DbsUser=${{ secrets.BS_USER }} \
            -DbsKey=${{ secrets.BS_KEY }} \
            -DbsAppId=${{ secrets.BS_APP_ID }} \
            -Dappium.host=127.0.0.1 \
            -Dappium.port=4723 \
            -v -e

      - name: Test Result Status
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::warning::Tests failed. Review logs and artifacts for details."
          exit 1

      # ============================================
      # 6. ARTIFACT COLLECTION
      # ============================================
      - name: Collect Allure Results
        if: always()
        run: |
          mkdir -p artifacts/allure-results
          if [ -d "target/allure-results" ]; then
            cp -r target/allure-results/* artifacts/allure-results/ || true
          fi
          ls -la artifacts/allure-results/ || true

      - name: Collect Test Reports
        if: always()
        run: |
          mkdir -p artifacts/reports
          # TestNG reports
          if [ -d "test-output" ]; then
            cp -r test-output/* artifacts/reports/ || true
          fi
          # Cucumber reports
          if [ -d "target/cucumber-reports" ]; then
            cp -r target/cucumber-reports/* artifacts/reports/ || true
          fi
          # HTML reports
          if [ -d "reports" ]; then
            cp -r reports/* artifacts/reports/ || true
          fi
          ls -la artifacts/reports/ || true

      - name: Collect Screenshots & Logs
        if: always()
        run: |
          mkdir -p artifacts/screenshots artifacts/logs
          # Screenshots
          if [ -d "test-output/screenshots" ]; then
            cp -r test-output/screenshots/* artifacts/screenshots/ || true
          fi
          if [ -d "screenshots" ]; then
            cp -r screenshots/* artifacts/screenshots/ || true
          fi
          # Appium logs
          if [ -d "appium-logs" ]; then
            cp -r appium-logs/* artifacts/logs/ || true
          fi
          # Maven logs
          if [ -f "target/maven.log" ]; then
            cp target/maven.log artifacts/logs/ || true
          fi
          ls -la artifacts/screenshots/ || true
          ls -la artifacts/logs/ || true

      # ============================================
      # 7. ARTIFACT UPLOADS
      # ============================================
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: logs-${{ needs.prepare.outputs.execution-type }}
          path: artifacts/logs/
          retention-days: 7
          if-no-files-found: warn

      # ============================================
      # 8. CLEANUP
      # ============================================
      - name: Stop Appium Server
        if: always() && needs.prepare.outputs.execution-type != 'cloud'
        continue-on-error: true
        run: |
          if [ -f appium.pid ]; then
            kill $(cat appium.pid) || true
          fi
          pkill -f appium || true

      - name: Stop Android Emulator
        if: always() && (needs.prepare.outputs.execution-type == 'local-android' || needs.prepare.outputs.execution-type == 'hybrid')
        continue-on-error: true
        run: |
          $ANDROID_HOME/platform-tools/adb emu kill || true
          pkill -f emulator || true

  # ============================================
  # REPORT GENERATION & PUBLISHING
  # ============================================
  publish-allure-report:
    if: always()
    needs: mobile-tests
    runs-on: ubuntu-latest
    steps:
      - name: Download Allure Results
        uses: actions/download-artifact@v5
        with:
          path: allure-data
          pattern: allure-results-*

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-data/allure-results-local-android
          subfolder: allure-report
          report_url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          cname: testcenter.example.com  # Optional: configure your custom domain
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

  # ============================================
  # NOTIFICATIONS & STATUS
  # ============================================
  notify:
    if: always()
    needs: [mobile-tests, publish-allure-report]
    runs-on: ubuntu-latest
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.mobile-tests.result }}" == "success" ]; then
            echo "status=✅ SUCCESS"
            echo "color=good"
          else
            echo "status=❌ FAILURE"
            echo "color=danger"
          fi
          echo "status_name=$status" >> $GITHUB_OUTPUT
          echo "color_name=$color" >> $GITHUB_OUTPUT

      - name: Slack Notification
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Mobile Test Pipeline: ${{ steps.status.outputs.status_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "📱 Mobile Automation Test Results"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n${{ github.workflow }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* ${{ steps.status.outputs.status_name }}\n*Report:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Pipeline>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create GitHub Check
        if: always()
        run: |
          echo "Test pipeline completed with status: ${{ needs.mobile-tests.result }}"
