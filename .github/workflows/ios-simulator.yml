name: iOS Simulator Tests

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/test/**'
      - 'pom.xml'
      - '.github/workflows/ios-simulator.yml'
  pull_request:
    branches: [master, develop]
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  ios-tests:
    runs-on: macos-latest
    environment: production
    timeout-minutes: 90

    steps:
      # =====================================================
      # CHECKOUT
      # =====================================================
      - name: Checkout code
        uses: actions/checkout@v6

      # =====================================================
      # JAVA
      # =====================================================
      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # =====================================================
      # NODE
      # =====================================================
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      # =====================================================
      # APPIUM + XCUITEST
      # =====================================================
      - name: Install Appium and XCUITest Driver
        run: |
          npm uninstall -g appium || true
          npm install -g appium@latest --ignore-scripts

          appium driver uninstall xcuitest || true
          appium driver install xcuitest

          appium --version
          appium driver list

      # =====================================================
      # XCODE INFORMATION
      # =====================================================
      - name: Show Xcode and Available Simulators
        run: |
          xcodebuild -version
          xcrun simctl list devices available

      # =====================================================
      # CREATE AND BOOT iOS SIMULATOR
      # =====================================================
      - name: Create and Boot iPhone Simulator
        run: |
          # Use the first available iOS runtime
          RUNTIME=$(xcrun simctl list runtimes \
            | grep "iOS" \
            | grep -v "unavailable" \
            | head -n 1 \
            | awk -F '[()]' '{print $2}')

          echo "Selected runtime: $RUNTIME"

          # Remove old simulator if it exists
          xcrun simctl delete "CI-iPhone" || true

          # Create new simulator
          UDID=$(xcrun simctl create "CI-iPhone" "iPhone 16" "$RUNTIME")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

          # Boot simulator
          xcrun simctl boot "$UDID"

          # Wait until boot completes
          xcrun simctl bootstatus "$UDID" -b

          # Open Simulator app (optional but helps stability)
          open -a Simulator

          # Unlock simulator
          xcrun simctl ui "$UDID" appearance light || true

          echo "Booted simulator UDID: $UDID"

      # =====================================================
      # START APPIUM SERVER
      # =====================================================
      - name: Start Appium Server
        run: |
          mkdir -p appium-logs

          nohup appium \
            --log-level debug \
            --log-timestamp \
            > appium-logs/server.log 2>&1 &

          echo $! > appium.pid

          echo "Waiting for Appium to start..."
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:4723/status > /dev/null; then
              echo "Appium started successfully"
              break
            fi
            echo "Waiting for Appium ($i/30)..."
            sleep 1
          done

          echo "=== Appium Status ==="
          curl -s http://127.0.0.1:4723/status | python3 -m json.tool || true

      # =====================================================
      # VERIFY SIMULATOR
      # =====================================================
      - name: Verify Simulator
        run: |
          xcrun simctl list devices | grep Booted
          echo "Simulator UDID: $SIMULATOR_UDID"

      # =====================================================
      # BUILD PROJECT
      # =====================================================
      - name: Build Project
        run: |
          mvn clean test-compile -DskipTests \
            -Dmaven.artifact.threads=10

      # =====================================================
      # RUN TESTS
      # =====================================================
      - name: Run All Tagged Tests
        id: run-all-tests
        continue-on-error: true
        run: |
          mvn clean test \
            "-Dtest=runners.TestRunner" \
            "-Dcucumber.filter.tags=@smoke or @cart or @login or @prod or @nav" \
            "-DexecutionType=local-emulator" \
            "-Dappium.host=127.0.0.1" \
            "-Dappium.port=4723" \
            "-Dplatform=iOS" \
            "-DdeviceName=iPhone 16" \
            "-Dudid=$SIMULATOR_UDID"

      # =====================================================
      # GENERATE ALLURE HTML REPORT
      # =====================================================
      - name: Generate Allure HTML Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history

      # =====================================================
      # UPLOAD ALLURE HTML REPORT
      # =====================================================
      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-html-report-ios
          path: allure-report
          retention-days: 30
          if-no-files-found: warn

      # =====================================================
      # UPLOAD TEST REPORTS
      # =====================================================
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-ios
          path: test-output
          retention-days: 30
          if-no-files-found: warn

      # =====================================================
      # UPLOAD SCREENSHOTS
      # =====================================================
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-ios
          path: test-output/screenshots
          retention-days: 14
          if-no-files-found: warn

      # =====================================================
      # UPLOAD APPIUM LOGS
      # =====================================================
      - name: Upload Appium Logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: appium-logs-ios
          path: appium-logs
          retention-days: 7
          if-no-files-found: warn

      # =====================================================
      # CLEANUP
      # =====================================================
      - name: Stop Services
        if: always()
        continue-on-error: true
        run: |
          # Stop Appium
          if [ -f appium.pid ]; then
            kill "$(cat appium.pid)" || true
          fi
          pkill -f appium || true

          # Shutdown simulator
          if [ -n "$SIMULATOR_UDID" ]; then
            xcrun simctl shutdown "$SIMULATOR_UDID" || true
            xcrun simctl delete "$SIMULATOR_UDID" || true
          fi

      # =====================================================
      # SUMMARY
      # =====================================================
      - name: Report Summary
        if: always()
        run: |
          echo "## iOS Simulator Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Execution Type:** local-ios" >> $GITHUB_STEP_SUMMARY
          echo "- **Simulator:** iPhone 16" >> $GITHUB_STEP_SUMMARY
          echo "- **Result:** ${{ steps.run-all-tests.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
