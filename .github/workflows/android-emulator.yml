name: Android Emulator Tests
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, develop]
    paths:
      - 'src/test/**'
      - 'pom.xml'
      - '.github/workflows/android-emulator.yml'
  pull_request:
    branches: [master, develop]
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  android-tests:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Appium
        run: |
          npm install -g appium@next --ignore-scripts
          appium driver install uiautomator2
          appium driver list

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Create Android Emulator
        run: |
          sudo apt-get update
          sudo apt-get install -y libpulse0 libxext6 libxrender1 libxkbcommon0 libfontconfig1
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "system-images;android-33;google_apis;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n emulator-5554 \
            -k "system-images;android-33;google_apis;x86_64" \
            -c 2048M \
            -force

      - name: Start Emulator
        run: |
          nohup $ANDROID_HOME/emulator/emulator -avd emulator-5554 \
            -no-snapshot-load \
            -no-snapshot-save \
            -no-audio \
            -no-boot-anim \
            -gpu off &
          
          echo "Waiting for emulator to boot..."
          $ANDROID_HOME/platform-tools/adb wait-for-device
          
          # Wait for system boot
          for i in {1..60}; do
            if $ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed | grep -q 1; then
              echo "Emulator ready after $((i*2)) seconds"
              break
            fi
            echo "Still waiting... ($i/60)"
            sleep 2
          done
          
          $ANDROID_HOME/platform-tools/adb devices

      - name: Start Appium Server
        run: |
          mkdir -p appium-logs
          nohup appium --log-level debug \
            --log-timestamp \
            --log-file appium-logs/server.log \
            --allow-insecure chromedriver_autodownload &
          
          echo "Waiting for Appium to start..."
          for i in {1..30}; do
            if curl -s http://localhost:4723/status > /dev/null 2>&1; then
              echo "Appium started successfully"
              break
            fi
            echo "Waiting for Appium ($i/30)..."
            sleep 1
          done
          
          # Verify Appium is running
          curl -s http://localhost:4723/status | jq .

      - name: Build Project
        run: |
          mvn clean compile -DskipTests \
            -X \
            -Dmaven.artifact.threads=10

      - name: Run Smoke Tests
        id: test-smoke
        continue-on-error: true
        run: |
          mvn test \
            -Dtest=runners.TestRunner \
            -Dcucumber.filter.tags="@smoke" \
            -DexecutionType=local-android \
            -Dappium.host=127.0.0.1 \
            -Dappium.port=4723 \
            -v

      - name: Run Regression Tests
        id: test-regression
        continue-on-error: true
        if: success()
        run: |
          mvn test \
            -Dtest=runners.TestRunner \
            -Dcucumber.filter.tags="@regression" \
            -DexecutionType=local-android \
            -Dappium.host=127.0.0.1 \
            -Dappium.port=4723 \
            -v

      - name: Collect Results
        if: always()
        run: |
          mkdir -p test-artifacts/{allure,reports,screenshots,logs}
          
          # Allure results
          [ -d "target/allure-results" ] && cp -r target/allure-results/* test-artifacts/allure/ || true
          
          # TestNG reports
          [ -d "test-output" ] && cp -r test-output/* test-artifacts/reports/ || true
          
          # Screenshots
          [ -d "test-output/screenshots" ] && cp -r test-output/screenshots/* test-artifacts/screenshots/ || true
          
          # Appium logs
          [ -d "appium-logs" ] && cp -r appium-logs/* test-artifacts/logs/ || true

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results-android
          path: test-artifacts/allure/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-android
          path: test-artifacts/reports/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots-android
          path: test-artifacts/screenshots/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Appium Logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: appium-logs-android
          path: test-artifacts/logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Stop Services
        if: always()
        continue-on-error: true
        run: |
          pkill -f appium || true
          $ANDROID_HOME/platform-tools/adb emu kill || true
          pkill -f emulator || true

      - name: Report Summary
        if: always()
        run: |
          echo "## Android Emulator Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Smoke Tests:** ${{ steps.test-smoke.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression Tests:** ${{ steps.test-regression.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Allure Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
