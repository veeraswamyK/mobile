# ─── Execution ───────────────────────────────────────────────────────────────
# Options: local-emulator | local-real | cloud | hybrid
executionType=local-emulator

# Options: distributed | matrix
runMode=distributed

# ─── Platform ────────────────────────────────────────────────────────────────
platform=ANDROID

# ─── Local device ────────────────────────────────────────────────────────────
deviceName=Android Emulator
udid=emulator-5554
systemPort=8200
appPath=apps/app.apk

# ─── Cloud (BrowserStack) ────────────────────────────────────────────────────
# Credentials are intentionally NOT stored here.
# Set them as environment variables or JVM system properties:
#   -DbsUser=<your-user>   -DbsKey=<your-key>   -DbsAppId=bs://<app-id>
cloudUrl=https://hub-cloud.browserstack.com/wd/hub
